AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Ski Resort Parking Tracker - Monitors parking availability and sends SMS alerts

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
    MemorySize: 256
    Environment:
      Variables:
        SECRETS_NAME: !Ref SecretsName
        CONFIG_TABLE: !Ref ConfigTable

Parameters:
  SecretsName:
    Type: String
    Default: parking-tracker/secrets
    Description: Name of the Secrets Manager secret containing Twilio credentials

Resources:
  # DynamoDB table to store resort configurations and tracking state
  ConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-config
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  # Lambda function that checks parking availability
  ParkingCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: parking_checker.handler.lambda_handler
      Description: Checks ski resort parking availability and sends alerts
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: Check parking every minute
            Enabled: false
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConfigTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretsName}*

Outputs:
  ParkingCheckerFunction:
    Description: Parking Checker Lambda Function ARN
    Value: !GetAtt ParkingCheckerFunction.Arn
  ConfigTableName:
    Description: DynamoDB Config Table Name
    Value: !Ref ConfigTable
